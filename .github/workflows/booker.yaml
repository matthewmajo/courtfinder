name: Manual Court Booker

# 'workflow_dispatch' creates a manual "Run" button in GitHub Actions
on:
  workflow_dispatch: 

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Booker Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
        run: python booker.py
