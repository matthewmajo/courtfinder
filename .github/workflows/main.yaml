name: 5-Minute Tennis Poller

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

# We must grant the script permission to write the state file back to the repo
permissions:
  contents: write

jobs:
  run-poller:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Python script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python poller.py
        
      - name: Save Memory (state.json)
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update court availability memory" && git push)
